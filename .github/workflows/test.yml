name: Gateway Tests

on:
  push:
    branches: [master]
    paths: [gateway/**]
  pull_request:
    paths: [gateway/**]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run tests with coverage
        working-directory: gateway
        run: |
          go test ./... -coverprofile=coverage.txt -timeout 120s
          go tool cover -func=coverage.txt | tee coverage_func.txt
          COVERAGE=$(awk '/^total:/{gsub(/%/,"",$NF); printf "%.1f", $NF}' coverage_func.txt)
          echo "Coverage: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN{if(cov < 90){print "Coverage " cov "% < 90% — failing"; exit 1}}'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: gateway/coverage.txt
          flags: gateway
