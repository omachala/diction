# Diction self-hosted stack.
#
# Two ways to run transcription:
#
#   1. Gateway + whisper (recommended)
#      Point the Diction app at http://<host>:8080
#      Streaming over WebSocket. Words come back while you're still talking.
#
#   2. Whisper only (simplest)
#      Add `ports: ["8000:8000"]` to one of the whisper services and point the
#      Diction app straight at http://<host>:8000. No gateway needed.
#      Works via the app's HTTP fallback path. No streaming, so longer
#      dictations have a visible wait after you tap stop.
#
# Start the default stack (gateway + small model):
#   docker compose up -d
#
# Opt into larger models via compose profiles:
#   docker compose --profile medium up -d
#   docker compose --profile large up -d
#
# Valid DEFAULT_MODEL values: small, medium, large-v3-turbo
#
# Gateway endpoints:
#   POST /v1/audio/transcriptions   transcribe uploaded audio
#   WS   /v1/audio/stream           stream audio in real time
#   GET  /v1/models                 list available models
#   GET  /health                    health check

services:

  gateway:
    image: ghcr.io/omachala/diction-gateway:latest
    container_name: diction-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DEFAULT_MODEL: small
      # --- AI Enhancement (BYO LLM) ---
      # Uncomment and configure to enable AI transcript cleanup.
      # See README for setup guide and model recommendations.
      # LLM_BASE_URL: http://ollama:11434/v1
      # LLM_API_KEY: ollama
      # LLM_MODEL: gemma2:9b
      # LLM_PROMPT: "You are a transcript cleaner. Fix grammar, remove filler words (um, uh, er), and correct STT errors. Return only the cleaned text."
    depends_on:
      - whisper-small
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  whisper-small:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: diction-whisper-small
    restart: unless-stopped
    volumes:
      - whisper-models:/root/.cache/huggingface
    environment:
      WHISPER__MODEL: Systran/faster-whisper-small
      WHISPER__INFERENCE_DEVICE: cpu
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  whisper-medium:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: diction-whisper-medium
    restart: unless-stopped
    profiles: ["medium"]
    volumes:
      - whisper-models:/root/.cache/huggingface
    environment:
      WHISPER__MODEL: Systran/faster-whisper-medium
      WHISPER__INFERENCE_DEVICE: cpu
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  whisper-large-turbo:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: diction-whisper-large-turbo
    restart: unless-stopped
    profiles: ["large"]
    volumes:
      - whisper-models:/root/.cache/huggingface
    environment:
      WHISPER__MODEL: deepdml/faster-whisper-large-v3-turbo-ct2
      WHISPER__INFERENCE_DEVICE: cpu
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  ollama:
    image: ollama/ollama
    container_name: diction-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    volumes:
      - ollama-data:/root/.ollama

volumes:
  whisper-models:
    name: diction-whisper-models
  ollama-data:
    name: diction-ollama-data
